version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wms-postgres
    environment:
      POSTGRES_DB: wms_db
      POSTGRES_USER: wms_user
      POSTGRES_PASSWORD: wms_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - wms-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wms-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: wms_user
      DB_PASSWORD: wms_password
      DB_NAME: wms_db
      DB_SSLMODE: disable
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 24h
      SERVER_PORT: 8080
      SERVER_HOST: 0.0.0.0
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - wms-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wms-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - wms-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  wms-network:
    driver: bridge