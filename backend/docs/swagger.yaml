basePath: /api/v1
definitions:
  models.AuthResponse:
    description: Successful authentication response with JWT token
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      user:
        $ref: '#/definitions/models.User'
    type: object
  models.BreakDownRequest:
    description: Request payload for breaking down products from larger to smaller
      units
    properties:
      note:
        example: Break down for retail
        type: string
      product_id:
        example: 1
        type: integer
      qty_unit2:
        example: 5
        minimum: 1
        type: integer
      warehouse_id:
        example: 1
        type: integer
    required:
    - product_id
    - qty_unit2
    - warehouse_id
    type: object
  models.Customer:
    properties:
      created_at:
        type: string
      credit_limit:
        type: number
      credit_term:
        type: integer
      id:
        type: integer
      name:
        type: string
      outstanding:
        type: number
      updated_at:
        type: string
    required:
    - name
    type: object
  models.CustomerFormData:
    properties:
      address:
        type: string
      contact_person:
        type: string
      credit_limit:
        type: number
      credit_term:
        type: integer
      delivery_place:
        type: string
      last_contact:
        type: string
      level:
        type: string
      name:
        type: string
      note:
        type: string
      outstanding:
        type: number
      phone:
        type: string
      prefix:
        type: string
      transport:
        type: string
    required:
    - name
    type: object
  models.ErrorResponse:
    description: Standard error response format
    properties:
      code:
        example: 400
        type: integer
      details:
        example: Field 'name' is required
        type: string
      error:
        example: Invalid request parameters
        type: string
    type: object
  models.LoginRequest:
    description: User authentication request payload
    properties:
      password:
        example: password123
        type: string
      username:
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  models.OrderItemRequest:
    properties:
      note:
        type: string
      product_id:
        type: integer
      quantity:
        minimum: 0
        type: number
      unit:
        type: string
      unit_price:
        minimum: 0
        type: number
    required:
    - product_id
    - quantity
    - unit
    - unit_price
    type: object
  models.OrderRequest:
    properties:
      customer_id:
        type: integer
      delivery_address:
        type: string
      delivery_date:
        type: string
      items:
        items:
          $ref: '#/definitions/models.OrderItemRequest'
        minItems: 1
        type: array
      note:
        type: string
      order_date:
        type: string
      payment_terms:
        type: string
    required:
    - customer_id
    - items
    - order_date
    type: object
  models.PackUpRequest:
    description: Request payload for packing products from smaller to larger units
    properties:
      note:
        example: Pack for wholesale
        type: string
      product_id:
        example: 1
        type: integer
      qty_unit2:
        example: 3
        minimum: 1
        type: integer
      warehouse_id:
        example: 1
        type: integer
    required:
    - product_id
    - qty_unit2
    - warehouse_id
    type: object
  models.Product:
    description: Product information with pricing and inventory details
    properties:
      brand:
        example: TechCorp
        type: string
      cost:
        example: 25.5
        type: number
      created_at:
        example: "2024-01-15T10:30:00Z"
        type: string
      group:
        example: Electronics
        type: string
      id:
        example: 1
        type: integer
      message:
        example: Handle with care
        type: string
      model:
        example: TC-2024
        type: string
      name:
        example: Premium Widget A
        type: string
      note:
        example: Fragile item
        type: string
      ratio:
        example: 12
        type: number
      short_name:
        example: PWA-001
        type: string
      size:
        example: Large
        type: string
      unit1:
        example: PCS
        type: string
      unit2:
        example: BOX
        type: string
      updated_at:
        example: "2024-01-15T10:30:00Z"
        type: string
    required:
    - name
    - unit1
    type: object
  models.ProductPrice:
    properties:
      created_at:
        type: string
      customer_group_id:
        type: integer
      id:
        type: integer
      price:
        minimum: 0
        type: number
      product_id:
        type: integer
      unit:
        type: string
      updated_at:
        type: string
    required:
    - customer_group_id
    - price
    - product_id
    - unit
    type: object
  models.RegisterRequest:
    description: User registration request payload
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: securepass123
        minLength: 6
        type: string
      role:
        example: user
        type: string
      username:
        example: newuser
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  models.SalesOrder:
    properties:
      created_at:
        type: string
      customer:
        type: string
      date:
        type: string
      id:
        type: integer
      note:
        type: string
      so_number:
        type: string
      updated_at:
        type: string
    required:
    - customer
    - date
    - so_number
    type: object
  models.StockAdjustRequest:
    description: Request payload for adjusting stock levels (corrections)
    properties:
      new_remain1:
        example: 150
        minimum: 0
        type: integer
      new_remain2:
        example: 12
        minimum: 0
        type: integer
      note:
        example: Annual inventory count
        type: string
      product_id:
        example: 1
        type: integer
      reason:
        example: Physical count correction
        type: string
      warehouse_id:
        example: 1
        type: integer
    required:
    - product_id
    - reason
    - warehouse_id
    type: object
  models.StockCardEntry:
    properties:
      created_by:
        type: string
      date:
        type: string
      note:
        type: string
      qty:
        type: number
      ref_id:
        type: integer
      ref_type:
        type: string
      type:
        type: string
      unit:
        type: string
    type: object
  models.StockInRequest:
    description: Request payload for adding stock to warehouse
    properties:
      note:
        example: Initial stock
        type: string
      product_id:
        example: 1
        type: integer
      qty:
        example: 100
        minimum: 0
        type: number
      ref_id:
        example: 123
        type: integer
      ref_type:
        example: PO
        type: string
      unit:
        example: PCS
        type: string
      warehouse_id:
        example: 1
        type: integer
    required:
    - product_id
    - qty
    - unit
    - warehouse_id
    type: object
  models.StockOutRequest:
    description: Request payload for removing stock from warehouse
    properties:
      note:
        example: Sales order fulfillment
        type: string
      product_id:
        example: 1
        type: integer
      qty:
        example: 50
        minimum: 0
        type: number
      ref_id:
        example: 456
        type: integer
      ref_type:
        example: SO
        type: string
      unit:
        example: PCS
        type: string
      warehouse_id:
        example: 1
        type: integer
    required:
    - product_id
    - qty
    - unit
    - warehouse_id
    type: object
  models.StockSummary:
    properties:
      product_id:
        type: integer
      product_name:
        type: string
      remain1:
        type: integer
      remain2:
        type: integer
      total_remain:
        type: integer
      unit1:
        type: string
      unit2:
        type: string
      updated_at:
        type: string
      warehouse_id:
        type: integer
      warehouse_name:
        type: string
    type: object
  models.SuccessResponse:
    description: Standard success response format
    properties:
      data: {}
      message:
        example: Operation completed successfully
        type: string
    type: object
  models.TransferRequest:
    description: Request payload for transferring stock between warehouses
    properties:
      from_warehouse_id:
        example: 1
        type: integer
      note:
        example: Rebalancing inventory
        type: string
      product_id:
        example: 1
        type: integer
      qty:
        example: 25
        minimum: 0
        type: number
      ref_id:
        example: 789
        type: integer
      ref_type:
        example: TF
        type: string
      to_warehouse_id:
        example: 2
        type: integer
      unit:
        example: PCS
        type: string
    required:
    - from_warehouse_id
    - product_id
    - qty
    - to_warehouse_id
    - unit
    type: object
  models.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      role:
        type: string
      updated_at:
        type: string
      username:
        minLength: 3
        type: string
    required:
    - email
    - username
    type: object
  models.Warehouse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      location:
        type: string
      name:
        type: string
      note:
        type: string
      updated_at:
        type: string
    required:
    - name
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: WMS API Support
    url: http://www.example.com/support
  description: Warehouse Management System API with comprehensive inventory, order,
    and customer management capabilities
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: WMS API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user credentials and return JWT access token for API
        access
      parameters:
      - description: User login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successful authentication
          schema:
            $ref: '#/definitions/models.AuthResponse'
        "400":
          description: Invalid request format
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: User login
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account in the system with automatic JWT token
        generation
      parameters:
      - description: User registration data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/models.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created successfully
          schema:
            $ref: '#/definitions/models.AuthResponse'
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: User already exists
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: User registration
      tags:
      - auth
  /customers:
    get:
      consumes:
      - application/json
      description: Get a list of all customers in the system with optional filtering
        and pagination
      parameters:
      - default: 1
        description: Page number
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - description: Search term for customer name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of customers
          schema:
            allOf:
            - $ref: '#/definitions/models.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Customer'
                  type: array
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all customers
      tags:
      - customers
    post:
      consumes:
      - application/json
      description: Add a new customer to the system
      parameters:
      - description: Customer information
        in: body
        name: customer
        required: true
        schema:
          $ref: '#/definitions/models.CustomerFormData'
      produces:
      - application/json
      responses:
        "201":
          description: Created customer
          schema:
            allOf:
            - $ref: '#/definitions/models.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Customer'
              type: object
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Customer already exists
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create new customer
      tags:
      - customers
  /customers/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve detailed information for a specific customer
      parameters:
      - description: Customer ID
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Customer details
          schema:
            allOf:
            - $ref: '#/definitions/models.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Customer'
              type: object
        "400":
          description: Invalid customer ID
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Customer not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get customer by ID
      tags:
      - customers
  /customers/search:
    get:
      consumes:
      - application/json
      description: Search for customers by name or other criteria
      parameters:
      - description: Search query
        in: query
        minLength: 2
        name: q
        required: true
        type: string
      - default: 20
        description: Maximum results
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Search results
          schema:
            allOf:
            - $ref: '#/definitions/models.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Customer'
                  type: array
              type: object
        "400":
          description: Invalid search parameters
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Search customers
      tags:
      - customers
  /orders:
    get:
      consumes:
      - application/json
      description: Get a list of all orders in the system with optional filtering
        and pagination
      parameters:
      - default: 1
        description: Page number
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - description: Filter by order status
        in: query
        name: status
        type: string
      - description: Filter by customer ID
        in: query
        name: customer_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of orders
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all orders
      tags:
      - orders
    post:
      consumes:
      - application/json
      description: Create a new order with items for a customer
      parameters:
      - description: Order information with items
        in: body
        name: order
        required: true
        schema:
          $ref: '#/definitions/models.OrderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created order
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create new order
      tags:
      - orders
  /orders/{id}:
    delete:
      consumes:
      - application/json
      description: Remove an order from the system
      parameters:
      - description: Order ID
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Order deleted successfully
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Invalid order ID
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Order not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete order
      tags:
      - orders
    get:
      consumes:
      - application/json
      description: Retrieve detailed information for a specific order including customer
        and items
      parameters:
      - description: Order ID
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Order details
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Invalid order ID
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Order not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get order by ID
      tags:
      - orders
    put:
      consumes:
      - application/json
      description: Update an existing order's information and items
      parameters:
      - description: Order ID
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      - description: Updated order information
        in: body
        name: order
        required: true
        schema:
          $ref: '#/definitions/models.OrderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated order
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Order not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update order
      tags:
      - orders
  /orders/{id}/status:
    patch:
      consumes:
      - application/json
      description: Update the status of an existing order
      parameters:
      - description: Order ID
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      - description: New order status
        in: body
        name: status
        required: true
        schema:
          properties:
            status:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Order status updated successfully
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Order not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update order status
      tags:
      - orders
  /orders/customer/{customerId}:
    get:
      consumes:
      - application/json
      description: Retrieve all orders for a specific customer
      parameters:
      - description: Customer ID
        in: path
        minimum: 1
        name: customerId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Customer orders
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Invalid customer ID
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get orders by customer
      tags:
      - orders
  /products:
    get:
      consumes:
      - application/json
      description: Get a list of all products in the system with optional filtering
        and pagination
      parameters:
      - default: 1
        description: Page number
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - description: Search term for product name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of products
          schema:
            allOf:
            - $ref: '#/definitions/models.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Product'
                  type: array
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all products
      tags:
      - products
    post:
      consumes:
      - application/json
      description: Add a new product to the system
      parameters:
      - description: Product information
        in: body
        name: product
        required: true
        schema:
          $ref: '#/definitions/models.Product'
      produces:
      - application/json
      responses:
        "201":
          description: Created product
          schema:
            allOf:
            - $ref: '#/definitions/models.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Product'
              type: object
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Product already exists
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create new product
      tags:
      - products
  /products/{id}:
    delete:
      consumes:
      - application/json
      description: Remove a product from the system
      parameters:
      - description: Product ID
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Product deleted successfully
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Invalid product ID
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Product not found
